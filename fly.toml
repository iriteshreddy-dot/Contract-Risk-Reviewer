# Fly.io configuration for the Contract Risk Reviewer.
# Adjust `app` to a name unique to your Fly account (this one is a suggestion).

app            = "contract-risk-reviewer"
primary_region = "bom"   # Mumbai. Change as needed: iad, sin, fra, lhr, etc.

[build]
  # Use the Dockerfile in the repo root — explicit, reproducible.

[env]
  # Application reads PORT, DB_PATH at boot.
  PORT     = "8080"
  DB_PATH  = "/data/reviews.db"
  NODE_ENV = "production"

# ── HTTP service ──────────────────────────────────────────
# The Fastify server listens on PORT; Fly proxies external HTTPS to it.
[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"   # scale to zero when idle (cheap)
  auto_start_machines = true     # wake on first request (~2-5s cold start)
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

# ── Persistent storage for SQLite ────────────────────────
# Without this, reviews.db is lost on every machine restart.
[[mounts]]
  source      = "reviews_data"
  destination = "/data"

# ── VM sizing ─────────────────────────────────────────────
# shared-cpu-1x / 512MB is enough for this workload and is the cheapest tier.
[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
